<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paredão 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  color: white;
  overflow: hidden;
}

/* FUNDO (AGORA ONLINE, NÃO TEM COMO DAR ERRO) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://images.unsplash.com/photo-1511512578047-dfb367046420") center/cover no-repeat;
  filter: brightness(0.35);

  z-index: -2;
}

/* OVERLAY VERMELHO */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(255, 0, 0, 0.25);

  z-index: -1;
}

/* CENTRALIZA */
.screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* TELA 1 */
#home h1 {
  font-size: 4rem;
  color: #ff1a1a;
  text-shadow: 0 0 30px #ff1a1a;
  animation: pulse 2s infinite;
}

#home p {
  margin-top: 10px;
  opacity: 0.8;
}

/* BOTÕES */
.btn, .btn-voltar {
  margin-top: 30px;
  padding: 15px 40px;
  border: 2px solid #ff1a1a;
  color: white;
  background: transparent;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover, .btn-voltar:hover {
  background: #ff1a1a;
  box-shadow: 0 0 25px #ff1a1a;
  transform: scale(1.05);
}

/* TELA 2 */
#info {
  display: none;
  animation: zoomIn 1s ease;
}

#info h2 {
  font-size: 3rem;
  color: #ff1a1a;
  text-shadow: 0 0 20px #ff1a1a;
}

#info p {
  margin-top: 10px;
  opacity: 0.8;
}

/* ANIMAÇÕES */
@keyframes pulse {
  0% { text-shadow: 0 0 15px #ff1a1a; }
  50% { text-shadow: 0 0 40px #ff1a1a; }
  100% { text-shadow: 0 0 15px #ff1a1a; }
}

@keyframes zoomIn {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="home" class="screen">
  <h1>PAREDÃO 2026</h1>
  <p>Noite estilo cassino 🔥🎲</p>
  <button class="btn">SABER MAIS</button>
</div>

<!-- TELA 2 -->
<div id="info" class="screen">
  <h2>🔥 12 DE JUNHO - 22H 🔥</h2>
  <p>Quadra da escola</p>
  <button class="btn-voltar">VOLTAR</button>
</div>

<script>
const btn = document.querySelector('.btn');
const voltar = document.querySelector('.btn-voltar');

const home = document.getElementById('home');
const info = document.getElementById('info');

btn.onclick = () => {
  home.style.display = "none";
  info.style.display = "flex";
};

voltar.onclick = () => {
  info.style.display = "none";
  home.style.display = "flex";
};
</script>

</body>
</html>
