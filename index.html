<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paredão 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow: hidden;
  color: white;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  filter: brightness(0.3);
  z-index: -3;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,0,0,0.25);
  z-index: -2;
}

/* CARTAS */
.card {
  position: fixed;
  top: -80px;
  width: 40px;
  height: 60px;
  background: white;
  border-radius: 5px;
  animation: fall linear forwards;
  z-index: -1;
}

.card::after {
  content: "♦";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  color: red;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* TELA */
.screen {
  position: fixed;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* TEXTO COM ENTRADA SUAVE */
h1 {
  font-size: 4rem;
  color: #ff1a1a;
  text-shadow: 0 0 30px #ff1a1a;

  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1.5s ease forwards;
}

p {
  margin-top: 10px;

  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1.5s ease forwards;
  animation-delay: 0.5s;
}

/* BOTÃO REDONDO + ANIMADO */
.btn, .btn-voltar {
  margin-top: 30px;
  padding: 15px 40px;
  border: 2px solid #ff1a1a;
  background: transparent;
  color: white;
  cursor: pointer;
  font-size: 1rem;

  border-radius: 50px; /* 🔥 BOTÃO REDONDO */

  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1.5s ease forwards;
  animation-delay: 1s;

  position: relative;
  overflow: hidden;
}

/* ANIMAÇÃO DE ENTRADA */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* BRILHO AUTOMÁTICO */
.btn::before, .btn-voltar::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.8),
    transparent
  );
  animation: shine 2.5s infinite;
}

@keyframes shine {
  0% { left: -100%; }
  100% { left: 100%; }
}

/* HOVER */
.btn:hover, .btn-voltar:hover {
  background: #ff1a1a;
  color: black;
  transform: scale(1.1);
}

/* CLIQUE */
.btn:active, .btn-voltar:active {
  transform: scale(0.9);
}

/* TELA 2 */
#info {
  display: none;
}

h2 {
  font-size: 3rem;
  color: #ff1a1a;
}
</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<div class="overlay"></div>

<div id="home" class="screen">
  <h1>PAREDÃO 2026</h1>
  <p>Noite estilo cassino 🔥🎲</p>
  <button class="btn">SABER MAIS</button>
</div>

<div id="info" class="screen">
  <h2>🔥 12 DE JUNHO - 22H 🔥</h2>
  <button class="btn-voltar">VOLTAR</button>
</div>

<script>
const btn = document.querySelector('.btn');
const voltar = document.querySelector('.btn-voltar');
const home = document.getElementById('home');
const info = document.getElementById('info');

btn.onclick = () => {
  home.style.display = "none";
  info.style.display = "flex";
};

voltar.onclick = () => {
  info.style.display = "none";
  home.style.display = "flex";
};

/* CARTAS */
function createCard() {
  const card = document.createElement("div");
  card.classList.add("card");

  card.style.left = Math.random() * 100 + "vw";
  card.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(card);

  setTimeout(() => card.remove(), 8000);
}

setInterval(createCard, 250);
</script>

</body>
</html>
