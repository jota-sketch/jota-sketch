<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paredão 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow: hidden;
  color: white;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100vh;
  object-fit: cover;
  filter: brightness(0.3);
  z-index: -3;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,0,0,0.25);
  z-index: -2;
}

/* CARTAS */
.card {
  position: fixed;
  top: -50px;
  font-size: 30px;
  animation: fall linear forwards;
  opacity: 0.8;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* CENTRALIZA */
.screen {
  position: fixed;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

h1 {
  font-size: 4rem;
  color: #ff1a1a;
  text-shadow: 0 0 30px #ff1a1a;
}

.btn, .btn-voltar {
  margin-top: 30px;
  padding: 15px 40px;
  border: 2px solid #ff1a1a;
  background: transparent;
  color: white;
  cursor: pointer;
}

/* TELA 2 */
#info {
  display: none;
}
</style>
</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<div class="overlay"></div>

<!-- TELA 1 -->
<div id="home" class="screen">
  <h1>PAREDÃO 2026</h1>
  <button class="btn">SABER MAIS</button>
</div>

<!-- TELA 2 -->
<div id="info" class="screen">
  <h2>🔥 12 DE JUNHO - 22H 🔥</h2>
  <button class="btn-voltar">VOLTAR</button>
</div>

<script>
const btn = document.querySelector('.btn');
const voltar = document.querySelector('.btn-voltar');
const home = document.getElementById('home');
const info = document.getElementById('info');

btn.onclick = () => {
  home.style.display = "none";
  info.style.display = "flex";
};

voltar.onclick = () => {
  info.style.display = "none";
  home.style.display = "flex";
};

/* GERADOR DE CARTAS */
const symbols = ["♠","♥","♦","♣"];

function createCard() {
  const card = document.createElement("div");
  card.classList.add("card");

  card.innerText = symbols[Math.floor(Math.random() * symbols.length)];

  card.style.left = Math.random() * 100 + "vw";
  card.style.animationDuration = (3 + Math.random() * 5) + "s";
  card.style.fontSize = (20 + Math.random() * 30) + "px";

  document.body.appendChild(card);

  setTimeout(() => {
    card.remove();
  }, 8000);
}

setInterval(createCard, 300);
</script>

</body>
</html>
