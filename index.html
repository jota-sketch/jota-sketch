<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paredão 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* CENTRALIZA TUDO NA TELA */
.screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* TELA 1 */
#home {
  animation: fadeIn 1.5s ease;
}

#home h1 {
  font-size: 4rem;
  color: #ff1a1a;
  text-shadow: 0 0 20px #ff1a1a;
  animation: pulse 2s infinite;
}

#home p {
  margin-top: 10px;
  opacity: 0.7;
}

.btn {
  margin-top: 30px;
  padding: 12px 30px;
  border: 2px solid #ff1a1a;
  color: white;
  background: transparent;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #ff1a1a;
  box-shadow: 0 0 20px #ff1a1a;
  transform: scale(1.05);
}

/* TELA 2 */
#info {
  display: none;
  animation: zoomIn 1s ease;
}

#info h2 {
  font-size: 3rem;
  color: #ff1a1a;
  text-shadow: 0 0 20px #ff1a1a;
}

#info p {
  margin-top: 10px;
  opacity: 0.7;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0% { text-shadow: 0 0 10px #ff1a1a; }
  50% { text-shadow: 0 0 30px #ff1a1a; }
  100% { text-shadow: 0 0 10px #ff1a1a; }
}

@keyframes zoomIn {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="home" class="screen">
  <h1>PAREDÃO 2026</h1>
  <p>O evento mais pesado da escola 🔊🔥</p>
  <button class="btn">SABER MAIS</button>
</div>

<!-- TELA 2 -->
<div id="info" class="screen">
  <h2>🔥 12 DE JUNHO - 22H 🔥</h2>
  <p>Local: Quadra da escola</p>
</div>

<script>
const btn = document.querySelector('.btn');
const home = document.getElementById('home');
const info = document.getElementById('info');

btn.onclick = () => {
  home.style.display = "none";
  info.style.display = "flex";
};
</script>

</body>
</html>
